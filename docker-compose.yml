version: "3.8"

services:
  # ============================================================================
  # PostgreSQL: Primary relational database (Users, Tenants, API Keys, Billing)
  # ============================================================================
  db:
    image: postgres:16-alpine
    container_name: graphmind-db
    environment:
      POSTGRES_USER: graphmind
      POSTGRES_PASSWORD: graphmind_password
      POSTGRES_DB: graphmind
      POSTGRES_INITDB_ARGS: "-c ssl=off"  # Enable SSL in production
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U graphmind"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - graphmind-network

  # ============================================================================
  # Neo4j: Graph database (Agents, Knowledge Bases, Chunks, Relationships)
  # ============================================================================
  neo4j:
    image: neo4j:5.15-enterprise
    container_name: graphmind-neo4j
    environment:
      # CRITICAL: Change these in production
      NEO4J_AUTH: neo4j/graphmind_password
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
      # Memory settings (adjust based on your machine)
      NEO4J_dbms_memory_heap_initial__size: "1G"
      NEO4J_dbms_memory_heap_max__size: "2G"
      NEO4J_dbms_memory_pagecache_size: "1G"
      # Allow unencrypted local connections in development
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
    volumes:
      - neo4j_data:/var/lib/neo4j/data
    ports:
      - "7687:7687"  # Bolt protocol
      - "7474:7474"  # HTTP (Neo4j Browser)
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "graphmind_password", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - graphmind-network

  # ============================================================================
  # Redis: Cache and session management
  # ============================================================================
  redis:
    image: redis:7-alpine
    container_name: graphmind-redis
    command: redis-server --requirepass graphmind_redis_password --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - graphmind-network

  # ============================================================================
  # Ollama: Local LLM inference (for embeddings and entity extraction)
  # ============================================================================
  ollama:
    image: ollama/ollama:latest
    container_name: graphmind-ollama
    # IMPORTANT: On Windows/Mac with Docker Desktop, this needs extra GPU config
    # For CPU-only: remove 'deploy' section below
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]  # Remove this entire deploy section for CPU-only
    volumes:
      - ollama_models:/root/.ollama
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - graphmind-network

  # ============================================================================
  # FastAPI Backend Application
  # ============================================================================
  api:
    build: .
    container_name: graphmind-api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      # PostgreSQL
      - POSTGRES_USER=graphmind
      - POSTGRES_PASSWORD=graphmind_password
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=graphmind
      # Neo4j
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=graphmind_password
      # Redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=graphmind_redis_password
      - REDIS_DB=0
      # Ollama (local LLM)
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_MODEL=mistral  # Change to your preferred model
      # Application
      - DEBUG=true
      - APP_ENV=development
      - JWT_SECRET_KEY=your-secret-key-change-in-production-at-least-32-chars
      - DEEPINFRA_API_KEY=${DEEPINFRA_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
    networks:
      - graphmind-network

networks:
  graphmind-network:
    driver: bridge

volumes:
  postgres_data:
  neo4j_data:
  redis_data:
  ollama_models:
